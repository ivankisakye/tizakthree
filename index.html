<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- 🔥 FAVICON (browser tab icon) -->
    <link rel="icon" type="image/png" href="/logo4.png" />
    <link rel="apple-touch-icon" href="/logo4.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tizak Software Solutions</title>

    <meta
      name="description"
      content="Creating Modern Solutions Through Technology."
    />

    <!-- 🔥 OPEN GRAPH (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:title" content="Tizak Software Solutions" />
    <meta
      property="og:description"
      content="Creating Modern Solutions Through Technology."
    />

    <!-- MUST be absolute URL for sharing -->
    <meta property="og:image" content="https://tizaksoftware.com/logo4.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tizaksoftware.com" />

    <!-- Recommended OG image size -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Optional but improves compatibility -->
    <meta property="og:image:alt" content="Tizak Software Solutions Logo" />

    <!-- 🔥 TWITTER / X CARDS -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tizak Software Solutions" />
    <meta
      name="twitter:description"
      content="Creating Modern Solutions Through Technology."
    />
    <meta name="twitter:image" content="https://tizaksoftware.com/logo4.png" />
    <meta name="twitter:image:alt" content="Tizak Software Solutions Logo" />

    <!-- Helps some crawlers -->
    <meta name="theme-color" content="#0f172a" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tizak Software Solutions</title>

    <meta
      name="description"
      content="Creating Modern Solutions Through Technology."
    />

    <!-- 🔥 OPEN GRAPH (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:title" content="Tizak Software Solutions" />
    <meta
      property="og:description"
      content="Creating Modern Solutions Through Technology."
    />

    <!-- IMPORTANT: MUST be absolute URL -->
    <meta property="og:image" content="https://tizak.com/logofav.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tizak.com" />

      name="twitter:description"

    />

  </head>
